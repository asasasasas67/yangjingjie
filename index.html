<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入機電競價目表</title>
    <style>
        /* =========================================
           頁面基礎樣式 (背景與佈局)
           ========================================= */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止滾動 */
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 背景：粉灰漸層 (與之前一致，營造氛圍) */
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }

        /* 雪花畫布 */
        #snow-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        /* =========================================
           中間主容器 (霧面天空藍)
           ========================================= */
        .central-card {
            position: relative;
            z-index: 10;
            width: 350px;
            padding: 40px;
            /* 霧面天空藍與圓角 */
            background: rgba(135, 206, 235, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
            /* Y軸方向彈性佈局 */
            display: flex;
            flex-direction: column;
            gap: 20px; /* 元素間距 */
        }

        /* =========================================
           (關鍵效果) Simple7227 漸層霓虹標題
           ========================================= */
        .neon-title {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            font-weight: bold;
            
            /* 1. 文字漸層色 (使用 text-fill-color) */
            background: linear-gradient(90deg, #ff007f 0%, #00ffff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* 2. 霓虹閃爍效果 (多層淺藍 text-shadow + 動畫) */
            text-shadow: 0 0 1px rgba(255,255,255,0.8),
                         0 0 5px rgba(0,255,255,0.7),
                         0 0 10px rgba(0,191,255,0.6),
                         0 0 20px rgba(0,191,255,0.5),
                         0 0 40px rgba(0,191,255,0.4);
            
            /* 3. 綁定閃爍動畫 */
            animation: neon-flicker 1.5s infinite alternate;
        }

        /* =========================================
           霓虹閃爍動畫定義
           ========================================= */
        @keyframes neon-flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 1px rgba(255,255,255,0.8),
                             0 0 5px rgba(0,255,255,0.7),
                             0 0 10px rgba(0,191,255,0.6),
                             0 0 20px rgba(0,191,255,0.5);
                opacity: 1;
            }
            20%, 24%, 55% {
                text-shadow: none;
                opacity: 0.5; /* 模擬短暫斷電閃爍 */
            }
        }

        /* =========================================
           模板專用樣式 (用於新增文字)
           ========================================= */
        .template-section {
            display: flex;
            flex-direction: column;
            gap: 15px; /* 段落間距 */
            color: #555; /* 預設文字顏色，較深 */
        }

        /* 模板中的標題 */
        .template-heading {
            font-size: 1.2rem;
            font-weight: bold;
            /* 顏色改為與背景呼應的柔粉色 */
            color: #b19cd9; 
            margin: 0;
        }

        /* 模板中的段落 */
        .template-paragraph {
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
            color: #666; /* 稍微淡一些 */
        }

        /* ========================================================
           ★ 自定義模板 (在此修改文字和顏色)
           請編輯 HTML 部分的對應區塊
           CSS 的顏色可以透過搜尋對應類名 (e.g., .template-heading) 修改
           ======================================================== */
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="central-card">
        
        <h1 class="neon-title">入機電競價目表</h1>

        <div class="template-section">
            
            <h2 class="template-heading">金牌打手</h2>
            
            <p class="template-paragraph">
                普壩:$10
            <p class="template-paragraph">
                保底600萬
            </p>
            
            <h3 class="template-heading">魔王護</h3>
            
            <p class="template-paragraph">
                壓力單:20/場
            </p>
            <p class="template-paragraph">
                打手幫老闆起娤，老闆打不好時打手可壓力老闆
            </p>
        </div>
        </div>

    <script>
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, snowflakes = [];

        function init() {
            updateSize();
            createSnowflakes();
            animate();
        }

        function updateSize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function createSnowflakes() {
            const count = 100;
            snowflakes = [];
            for (let i = 0; i < count; i++) {
                snowflakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 3 + 1,
                    speed: Math.random() * 1 + 0.5,
                    opacity: Math.random() * 0.7
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            snowflakes.forEach(flake => {
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, ${flake.opacity})`;
                ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
                ctx.fill();

                flake.y += flake.speed;
                flake.x += Math.sin(flake.y / 50) * 0.5;

                if (flake.y > height) {
                    flake.y = -10;
                    flake.x = Math.random() * width;
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            updateSize();
            createSnowflakes();
        });

        init();
    </script>
</body>
</html>
