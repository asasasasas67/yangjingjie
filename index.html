<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub 個人網頁</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 350px; }
        h1 { color: #333; margin-bottom: 0.5rem; }
        p { color: #666; line-height: 1.6; }
        .btn { display: inline-block; margin-top: 1rem; padding: 10px 20px; background-color: #24292e; color: white; text-decoration: none; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background-color: #444; }
    </style>
</head>
<body>
    <div class="card">
        <h1>你好，我是 [你的名字] 👋</h1>
        <p>這是我在 GitHub Pages 上建立的第一個網頁。我熱衷於寫程式、設計與探索新技術。</p>
        <a href="https://github.com/你的用戶名" class="btn">追蹤我的 GitHub</a>
    </div>
</body>
</html>
