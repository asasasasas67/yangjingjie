<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粉灰漸層飄雪頁面</title>
    <style>
        /* 全域樣式設定 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止出現滾動條 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 背景：粉灰漸層 */
        body {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 雪花畫布 */
        #snow-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none; /* 讓滑鼠可以穿透畫布點擊後方 */
            z-index: 1;
        }

        /* 中間的霧面天空藍區塊 (Glassmorphism) */
        .glass-box {
            position: relative;
            z-index: 10;
            width: 400px;
            padding: 40px;
            background: rgba(135, 206, 235, 0.3); /* 天空藍半透明 */
            backdrop-filter: blur(15px); /* 關鍵：霧面模糊效果 */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            text-align: center;
            color: #fff;
        }

        h1 { margin: 0; font-size: 2rem; }
        p { opacity: 0.9; }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="glass-box">
        <h1>你知道嗎?</h1>
        <p> 我超級想<br>舔習近平的屌。</p>
    </div>

    <script>
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, snowflakes = [];

        function init() {
            updateSize();
            createSnowflakes();
            animate();
        }

        function updateSize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function createSnowflakes() {
            const count = 150; // 雪花數量
            for (let i = 0; i < count; i++) {
                snowflakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 3 + 1,
                    speed: Math.random() * 1 + 0.5,
                    opacity: Math.random() * 0.8
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "white";

            snowflakes.forEach(flake => {
                ctx.beginPath();
                ctx.globalAlpha = flake.opacity;
                ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
                ctx.fill();

                // 更新位置
                flake.y += flake.speed;
                flake.x += Math.sin(flake.y / 50) * 0.5; // 輕微左右晃動

                // 如果雪花落到底部，重回頂部
                if (flake.y > height) {
                    flake.y = -10;
                    flake.x = Math.random() * width;
                }
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            updateSize();
        });

        init();
    </script>
</body>
</html>
